<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nivetha ❤️</title>

<style>
body{
margin:0;
height:100vh;
overflow:hidden;
background:radial-gradient(circle,#ff4e50,#ff758c);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
color:white;
text-align:center;
}

h1{
font-size:40px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px yellow;}
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

#noBtn{
position:absolute;
}

.heart{
position:absolute;
width:20px;
height:20px;
background:red;
transform:rotate(-45deg);
animation:float 4s linear forwards;
}

.heart::before,
.heart::after{
content:"";
position:absolute;
width:20px;
height:20px;
background:red;
border-radius:50%;
}

.heart::before{ top:-10px;}
.heart::after{ left:10px;}

@keyframes float{
0%{opacity:1; transform:translateY(0) rotate(-45deg);}
100%{opacity:0; transform:translateY(-600px) rotate(-45deg);}
}

canvas{
position:absolute;
top:0;
left:0;
}
</style>
</head>

<body onclick="startLove()">

<h1>Nivetha ❤️</h1>
<h2>Will You Be Mine?</h2>

<div>
<button onclick="yesLove(event)">YES 💍</button>
<button id="noBtn" onmouseover="moveNo()">NO 😜</button>
</div>

<audio id="music" src="nivetha.mp3"></audio>
<canvas id="fireworks"></canvas>

<script>
function startLove(){
document.getElementById("music").play();

for(let i=0;i<25;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.bottom="0px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),4000);
}
}

function yesLove(e){
e.stopPropagation();
launchFireworks();
alert("Nivetha ❤️ You Are My Forever!");
}

function moveNo(){
let btn=document.getElementById("noBtn");
btn.style.top=Math.random()*window.innerHeight+"px";
btn.style.left=Math.random()*window.innerWidth+"px";
}

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function launchFireworks(){
for(let i=0;i<60;i++){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(Math.random()*canvas.width,
Math.random()*canvas.height,
4,0,Math.PI*2);
ctx.fill();
}
setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),800);
}
</script>

</body>
</html>
